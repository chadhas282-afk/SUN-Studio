<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sun Studios — AI-powered color palette generator that captures emotions, moods, and aesthetic vibes into beautiful, cohesive palettes." />
  <meta name="robots" content="index, follow" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 style-src 'self' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 script-src 'self';
                 img-src 'self' data: blob:;
                 connect-src 'none';
                 object-src 'none';
                 frame-ancestors 'none';" />
  <title>Sun Studios — Color Psychology Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
  <link rel="icon" type="image/png" href="logo.png" />
</head>
<body>
  
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--4" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app-shell">
        
    <header class="header" role="banner">
      <div class="header__bar">
        <div class="header__logo">
          <img src="logo.png" alt="Sun Studios Logo" class="header__logo-img" />
          <div class="header__logo-text-wrap">
            <span class="header__logo-text">Sun Studios</span>
            <span class="header__logo-sub">Color Psychology Studio</span>
          </div>
        </div>
        <nav class="header__actions" aria-label="App controls">
          <button id="browse-btn" class="header-btn header-btn--ghost" type="button" aria-label="Browse all palettes">
            <span aria-hidden="true">⊞</span>
            <span>Browse</span>
          </button>
